name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check if Render service exists
        id: check-render
        run: |
          if [ -f "render.yaml" ]; then
            echo "render_config_exists=true" >> $GITHUB_OUTPUT
            echo "✅ render.yaml found"
          else
            echo "render_config_exists=false" >> $GITHUB_OUTPUT
            echo "❌ render.yaml not found"
          fi
      
      - name: Install Render CLI
        if: steps.check-render.outputs.render_config_exists == 'true'
        run: |
          npm install -g @render-oss/cli 2>/dev/null || echo "Render CLI install skipped (optional)"
      
      - name: Create deployment summary
        run: |
          echo "## 🚀 Render Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** Push to Render via GitHub webhook" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Deployment queued" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Monitor deployment at:" >> $GITHUB_STEP_SUMMARY
          echo "- [Render Dashboard](https://dashboard.render.com)" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Actions](https://github.com/${{ github.repository }}/actions)" >> $GITHUB_STEP_SUMMARY
      
      - name: Success notification
        run: |
          echo "✅ Deploy workflow completed successfully"
          echo "Render will automatically deploy when GitHub webhook is triggered"
