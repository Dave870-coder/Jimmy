name: CI/CD Pipeline - Production Scale

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'  # Weekly security scan

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.12'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Code Quality & Security
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy bandit[toml] safety
          pip install -e ".[dev]"
      
      - name: Lint with flake8
        run: |
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=100
      
      - name: Format check with black
        run: black --check src tests
      
      - name: Import sorting with isort
        run: isort --check-only src tests
      
      - name: Type checking with mypy
        run: mypy src --ignore-missing-imports
      
      - name: Security scan with bandit
        run: bandit -r src -ll --exit-zero
      
      - name: Dependency check
        run: safety check --json --exit-code 0
      
      - name: SAST with semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: true

  # Unit & Integration Tests
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']
      fail-fast: false
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=junit/test-results.xml \
            -v
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_API_KEY: test_key
          TELEGRAM_BOT_TOKEN: test_token
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.os }}
          path: junit/

  # Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [quality, test]
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway Staging
        run: |
          curl -X POST https://api.railway.app/webhooks/deploy \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_STAGING_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "projectId": "${{ secrets.RAILWAY_STAGING_PROJECT_ID }}",
              "serviceId": "${{ secrets.RAILWAY_STAGING_SERVICE_ID }}"
            }'
      
      - name: Wait for deployment
        run: sleep 30
      
      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -f https://${{ secrets.RAILWAY_STAGING_DOMAIN }}/health; then
              echo "Staging deployment healthy"
              exit 0
            fi
            sleep 10
          done
          exit 1

  # Deploy to Production
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ secrets.RAILWAY_PROD_DOMAIN }}/health
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway Production
        run: |
          curl -X POST https://api.railway.app/webhooks/deploy \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_PROD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "projectId": "${{ secrets.RAILWAY_PROD_PROJECT_ID }}",
              "serviceId": "${{ secrets.RAILWAY_PROD_SERVICE_ID }}"
            }'
      
      - name: Wait for deployment
        run: sleep 60
      
      - name: Health check (with retries)
        run: |
          for i in {1..60}; do
            if curl -f https://${{ secrets.RAILWAY_PROD_DOMAIN }}/health; then
              echo "Production deployment healthy"
              exit 0
            fi
            echo "Attempt $i/60 failed, retrying..."
            sleep 10
          done
          exit 1
      
      - name: Run smoke tests
        run: |
          curl -f https://${{ secrets.RAILWAY_PROD_DOMAIN }}/api/v1/health
          curl -f https://${{ secrets.RAILWAY_PROD_DOMAIN }}/docs
      
      - name: Notify Slack (Success)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Production deployment successful!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment*\n*Status*: ✅ Success\n*Repository*: ${{ github.repository }}\n*Commit*: ${{ github.sha }}\n*URL*: https://${{ secrets.RAILWAY_PROD_DOMAIN }}"
                  }
                }
              ]
            }
      
      - name: Notify Slack (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Production deployment failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment*\n*Status*: ❌ Failed\n*Repository*: ${{ github.repository }}\n*Commit*: ${{ github.sha }}"
                  }
                }
              ]
            }

  # Performance Testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install load testing tools
        run: |
          pip install locust
      
      - name: Run load test
        run: |
          locust -f tests/load_test.py \
            --host=https://${{ secrets.RAILWAY_STAGING_DOMAIN }} \
            --users=1000 \
            --spawn-rate=50 \
            --run-time=5m \
            --headless

  # Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # Documentation
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install pdoc
      
      - name: Generate API docs
        run: |
          pdoc src --html --output-directory docs/api
      
      - name: Commit docs
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/api
          git commit -m "docs: Update API documentation" || echo "No changes"
          git push

  # Final Status
  status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [quality, test, build, deploy-prod, security]
    if: always()
    
    steps:
      - name: Check status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All checks passed!"
            exit 0
          else
            echo "❌ Some checks failed"
            exit 1
          fi
