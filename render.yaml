services:
  - type: web
    name: jimmy-ai-bot
    env: python
    pythonVersion: 3.12
    region: oregon
    plan: free
    buildCommand: bash ./build.sh
    startCommand: python run_bot.py
    healthCheckPath: /health
    disk:
      name: jimmy-data
      mountPath: /opt/data
      sizeGB: 1
    envVars:
      - key: DEBUG
        value: "False"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:////opt/data/bot.db
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GOOGLE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false
