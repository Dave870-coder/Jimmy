services:
  - type: web
    name: jimmy-ai-bot
    env: python
    pythonVersion: 3.12
    region: oregon
    plan: free
    buildCommand: bash ./build.sh
    startCommand: python run_bot.py
    healthCheckPath: /health
    healthCheckInterval: 10
    healthCheckTimeout: 5
    healthCheckUnhealthyThreshold: 3
    autoRestart: true
    disk:
      name: jimmy-data
      mountPath: /opt/data
      sizeGB: 1
    envVars:
      - key: DEBUG
        value: "False"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:////opt/data/bot.db
      - key: DATABASE_ECHO
        value: "False"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: API_HOST
        value: "0.0.0.0"
      - key: API_PORT
        value: "8000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: LOG_LEVEL
        value: "INFO"
      - key: GOOGLE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
    skipHealthCheckOnDeploy: false
